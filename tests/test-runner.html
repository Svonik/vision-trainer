<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vision Trainer Tests</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
    .pass { color: #0f0; }
    .fail { color: #f00; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Vision Trainer — Unit Tests</h1>
  <div id="results"></div>
  <script type="module">
    const results = document.getElementById('results');
    let passed = 0, failed = 0;

    window.assert = (condition, message) => {
      if (condition) {
        passed++;
        results.innerHTML += `<div class="pass">✓ ${message}</div>`;
      } else {
        failed++;
        results.innerHTML += `<div class="fail">✗ ${message}</div>`;
      }
    };

    window.assertEqual = (actual, expected, message) => {
      const pass = JSON.stringify(actual) === JSON.stringify(expected);
      if (!pass) {
        message += ` (got ${JSON.stringify(actual)}, expected ${JSON.stringify(expected)})`;
      }
      assert(pass, message);
    };

    window.testSuite = (name, fn) => {
      results.innerHTML += `<h3>${name}</h3>`;
      fn();
    };

    window.summarize = () => {
      results.innerHTML += `<hr><div>${passed} passed, ${failed} failed</div>`;
    };

    await import('./storage.test.js');
    await import('./i18n.test.js');
    await import('./safetyTimer.test.js');

    summarize();
  </script>
</body>
</html>
